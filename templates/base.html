<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lecturas del Día{% endblock %}</title>
  <meta name="description" content="{% block description %}Lecturas de la Misa del día — Conferencia Episcopal Española{% endblock %}">
  {% block og %}
  <meta property="og:title" content="Lecturas del Día">
  <meta property="og:description" content="Lecturas de la Misa del día — CEE">
  <meta property="og:type" content="website">
  {% endblock %}
  {% block canonical %}{% endblock %}
  <link rel="stylesheet" href="/assets/style.css?v={{ cache_bust }}">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
</head>
<body{% if day and day.color_css %} data-color="{{ day.color_css }}"{% endif %}>
  <div class="masthead">
    <a href="https://bizkeliza.org" target="_blank" rel="noopener" class="header-home" aria-label="Diócesis de Bilbao — bizkeliza.org">
      <img src="/assets/logo-bilbao.png?v={{ cache_bust }}" alt="Bilboko Elizbarrutia — Diócesis de Bilbao" width="167" height="48">
    </a>
    <a href="/" class="site-title">Lecturas del Día</a>
    <div class="masthead-actions">
      <a href="/" class="masthead-btn">Hoy</a>
      <button id="calendar-toggle" type="button" class="masthead-btn" aria-label="Elegir otra fecha" title="Elegir otra fecha">&#128197; Fecha</button>
    </div>
  </div>
  <div id="calendar-panel" hidden></div>

  {% block content %}{% endblock %}

  <footer>
    <p>
      <a href="https://bizkeliza.org" target="_blank" rel="noopener" class="footer-brand" aria-label="Diócesis de Bilbao — bizkeliza.org">
        <img src="/assets/logo-bilbao.png?v={{ cache_bust }}" alt="Bilboko Elizbarrutia — Diócesis de Bilbao" width="167" height="48">
      </a>
    </p>
    <p><a href="https://github.com/zeanuri/lecturasdeldia" target="_blank" rel="noopener">GitHub</a></p>
  </footer>

  <script src="/assets/app.js?v={{ cache_bust }}"></script>
</body>
</html>
